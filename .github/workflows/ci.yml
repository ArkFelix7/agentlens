name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  # -----------------------------------------------------------------------
  # Server — Python tests
  # -----------------------------------------------------------------------
  server:
    name: Server (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    defaults:
      run:
        working-directory: server

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check agentlens_server/ tests/ || true

      - name: Type check (mypy)
        run: mypy agentlens_server/ --ignore-missing-imports || true

      - name: Run unit tests
        run: pytest tests/ -v --tb=short -x --ignore=tests/test_websocket.py

  # -----------------------------------------------------------------------
  # Dashboard — TypeScript build + lint
  # -----------------------------------------------------------------------
  dashboard:
    name: Dashboard (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ["20"]

    defaults:
      run:
        working-directory: dashboard

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

  # -----------------------------------------------------------------------
  # SDK Python — import smoke test
  # -----------------------------------------------------------------------
  sdk-python:
    name: SDK Python
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: sdk-python

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install SDK
        run: pip install -e ".[dev]"

      - name: Run SDK tests
        run: pytest tests/ -v --tb=short

      - name: Smoke test imports
        run: |
          python -c "from agentlens_sdk import init, trace, auto_instrument; print('SDK imports OK')"
          python -c "from agentlens_sdk.interceptors import instrument_crewai, instrument_autogen; print('Interceptors imports OK')"

  # -----------------------------------------------------------------------
  # SDK TypeScript — build smoke test
  # -----------------------------------------------------------------------
  sdk-typescript:
    name: SDK TypeScript
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: sdk-typescript

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: sdk-typescript/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  # -----------------------------------------------------------------------
  # Integration test (server + demo agent)
  # -----------------------------------------------------------------------
  integration:
    name: Integration tests
    runs-on: ubuntu-latest
    needs: [server, sdk-python]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install server
        run: pip install -e ".[dev]"
        working-directory: server

      - name: Install SDK
        run: pip install -e .
        working-directory: sdk-python

      - name: Install test deps
        run: pip install httpx websockets pytest pytest-asyncio ulid-py

      - name: Start server in background
        run: |
          cd server
          uvicorn agentlens_server.main:app --port 8766 &
          echo $! > /tmp/server.pid
          sleep 2

      - name: Run integration tests
        run: python tests/integration/test_runner.py --bench

      - name: Stop server
        if: always()
        run: kill $(cat /tmp/server.pid) || true
